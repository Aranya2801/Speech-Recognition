<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0D10"/>
      <stop offset="100%" stop-color="#11151A"/>
    </linearGradient>
    <linearGradient id="barFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <circle cx="1010" cy="140" r="260" fill="url(#glow)"/>

  <!-- waveform motif -->
  <g transform="translate(80,205)">
    <!-- bars with varying heights to suggest a real waveform -->
    <g fill="url(#barFade)">
      <rect x="0"   y="-14" width="5" height="28" rx="2.5"/>
      <rect x="10"  y="-22" width="5" height="44" rx="2.5"/>
      <rect x="20"  y="-10" width="5" height="20" rx="2.5"/>
      <rect x="30"  y="-34" width="5" height="68" rx="2.5"/>
      <rect x="40"  y="-46" width="5" height="92" rx="2.5"/>
      <rect x="50"  y="-28" width="5" height="56" rx="2.5"/>
      <rect x="60"  y="-58" width="5" height="116" rx="2.5"/>
      <rect x="70"  y="-40" width="5" height="80" rx="2.5"/>
      <rect x="80"  y="-20" width="5" height="40" rx="2.5"/>
      <rect x="90"  y="-50" width="5" height="100" rx="2.5"/>
      <rect x="100" y="-30" width="5" height="60" rx="2.5"/>
      <rect x="110" y="-16" width="5" height="32" rx="2.5"/>
      <rect x="120" y="-38" width="5" height="76" rx="2.5"/>
      <rect x="130" y="-12" width="5" height="24" rx="2.5"/>
      <rect x="140" y="-26" width="5" height="52" rx="2.5"/>
      <rect x="150" y="-8"  width="5" height="16" rx="2.5"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="80" y="120" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#E6E8EB">
    Aranya
  </text>
  <text x="80" y="158" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#5EEAD4">
    Speech Recognition AI
  </text>

  <!-- tagline -->
  <text x="80" y="245" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16.5" fill="#8B92A0">
    Real-time transcription · speaker diarization · emotion detection · voice biometrics
  </text>
  <text x="80" y="270" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16.5" fill="#8B92A0">
    meeting &amp; podcast intelligence · RAG over your voice memory · multi-agent voice assistant
  </text>

  <!-- corner accent -->
  <g transform="translate(1145,55)">
    <circle r="3" fill="#F5A623"/>
    <circle r="3" cx="0" cy="0" fill="none" stroke="#F5A623" stroke-opacity="0.5">
      <animate attributeName="r" from="3" to="16" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.6" to="0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
