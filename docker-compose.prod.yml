# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: "3.9"

services:
  backend:
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --timeout 120
    environment:
      APP_DEBUG: "false"
      APP_ENV: "production"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    command: node server.js
    restart: unless-stopped

  celery-worker:
    restart: unless-stopped
    deploy:
      replicas: 2

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: speechai-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on: [backend, frontend]
    restart: unless-stopped
    networks: [speechnet]
